version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: comanda_db
    environment:
      POSTGRES_USER: ${DB_USER:-comanda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-comanda123}
      POSTGRES_DB: ${DB_NAME:-comanda_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-comanda}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comanda_backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER:-comanda}:${DB_PASSWORD:-comanda123}@postgres:5432/${DB_NAME:-comanda_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node src/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: comanda_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-http://localhost:5173}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
